# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: akibaguildtenten-source/jintore-site
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/3316a7d2-7aaf-49ad-a69a-d8e699715cd3/pkce
  auth_token_endpoint: /sites/3316a7d2-7aaf-49ad-a69a-d8e699715cd3/token
  gateway_url: https://gateway.decapbridge.com

# Enable PKCE fields (optional, recommended)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# 画像のアップロード先（CMSから入れた画像はここに保存されます）
media_folder: "images"
public_folder: "/images"

locale: "ja"

collections:
  - name: "site"
    label: "サイトの中身"
    files:
      - name: "content"
        label: "ホームページの中身"
        file: "content.json"
        description: "お知らせ・動画・書籍などをここで編集します。保存すると自動で公開されます。"
        fields:
          - { label: "「体験したい方へ」リンク先", name: "experienceUrl", widget: "string" }
          - { label: "公式LINEのURL", name: "lineUrl", widget: "string" }
          - { label: "「もっと見る」リンク先", name: "newsMoreUrl", widget: "string" }

          - label: "お知らせ"
            name: "announcements"
            widget: "list"
            label_singular: "お知らせ"
            summary: "{{fields.tag}}｜{{fields.title}}"
            fields:
              - { label: "ラベル（例：新刊書籍／緊急告知／重要）", name: "tag", widget: "string" }
              - { label: "日付・期間（任意）", name: "date", widget: "string", required: false }
              - { label: "タイトル", name: "title", widget: "string" }
              - { label: "本文", name: "body", widget: "text" }
              - { label: "強調枠にする", name: "important", widget: "boolean", default: false, required: false }
              - { label: "画像（任意）", name: "image", widget: "image", required: false }
              - label: "リンク（任意）"
                name: "link"
                widget: "object"
                required: false
                fields:
                  - { label: "表示名", name: "label", widget: "string", required: false }
                  - { label: "URL", name: "url", widget: "string", required: false }

          - label: "動画（YouTube）"
            name: "videos"
            widget: "list"
            label_singular: "動画"
            summary: "{{fields.title}}"
            fields:
              - { label: "YouTube ID（watch?v= の後ろ）", name: "id", widget: "string" }
              - { label: "タイトル", name: "title", widget: "string" }

          - label: "書籍"
            name: "books"
            widget: "list"
            label_singular: "書籍"
            summary: "{{fields.title}}"
            fields:
              - { label: "書名", name: "title", widget: "string" }
              - { label: "ラベル（例：Kindle）", name: "tag", widget: "string", required: false }
              - { label: "価格（任意）", name: "price", widget: "string", required: false }
              - { label: "説明", name: "desc", widget: "text", required: false }
              - { label: "仮表紙の大見出し", name: "cover", widget: "string", required: false }
              - { label: "仮表紙の小見出し", name: "coverSub", widget: "string", required: false }
              - { label: "表紙画像（任意）", name: "img", widget: "image", required: false }
              - label: "購入リンク"
                name: "links"
                widget: "list"
                required: false
                fields:
                  - { label: "表示名", name: "label", widget: "string" }
                  - { label: "URL", name: "url", widget: "string" }
                  - { label: "枠線スタイル", name: "alt", widget: "boolean", default: false, required: false }

          - label: "映像作品（DVD）"
            name: "dvd"
            widget: "list"
            label_singular: "DVD"
            summary: "{{fields.title}}"
            required: false
            fields:
              - { label: "タイトル", name: "title", widget: "string" }
              - { label: "ラベル", name: "tag", widget: "string", required: false }
              - { label: "価格（任意）", name: "price", widget: "string", required: false }
              - { label: "説明", name: "desc", widget: "text", required: false }
              - { label: "仮表紙の大見出し", name: "cover", widget: "string", required: false }
              - { label: "仮表紙の小見出し", name: "coverSub", widget: "string", required: false }
              - { label: "表紙画像（任意）", name: "img", widget: "image", required: false }
              - label: "購入リンク"
                name: "links"
                widget: "list"
                required: false
                fields:
                  - { label: "表示名", name: "label", widget: "string" }
                  - { label: "URL", name: "url", widget: "string" }
                  - { label: "枠線スタイル", name: "alt", widget: "boolean", default: false, required: false }

          - label: "最新情報（NEWS）"
            name: "news"
            widget: "list"
            label_singular: "最新情報"
            summary: "{{fields.date}}｜{{fields.title}}"
            fields:
              - { label: "日付（例：2025.05.08）", name: "date", widget: "string" }
              - { label: "タイトル", name: "title", widget: "string" }
              - { label: "リンクURL", name: "url", widget: "string" }

          - label: "メディア掲載"
            name: "media"
            widget: "list"
            label_singular: "掲載"
            summary: "{{fields.title}}"
            required: false
            fields:
              - { label: "種別（例：雑誌／WEB記事）", name: "kind", widget: "string" }
              - { label: "タイトル", name: "title", widget: "string" }
              - { label: "リンクURL（任意）", name: "url", widget: "string", required: false }

          - label: "5つの靭トレ"
            name: "union"
            widget: "list"
            label_singular: "ジャンル"
            summary: "{{fields.ja}}"
            fields:
              - { label: "英語ラベル", name: "en", widget: "string" }
              - { label: "名称", name: "ja", widget: "string" }

          - label: "活動内容（文章の箇条書き）"
            name: "activities"
            widget: "list"

          - label: "体験ページのお知らせ"
            name: "taikenNews"
            widget: "list"
            label_singular: "お知らせ"
            summary: "{{fields.date}}｜{{fields.title}}"
            fields:
              - { label: "日付・ラベル", name: "date", widget: "string" }
              - { label: "タイトル", name: "title", widget: "string" }
              - { label: "リンクURL", name: "url", widget: "string" }
              - { label: "「ご案内」バッジ", name: "pin", widget: "boolean", default: false, required: false }

          - label: "SNS"
            name: "sns"
            widget: "list"
            label_singular: "SNS"
            summary: "{{fields.label}}"
            required: false
            fields:
              - { label: "表示名", name: "label", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
